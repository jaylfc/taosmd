name: Publish to PyPI

# Publishes taosmd to PyPI via PyPI Trusted Publishing (OIDC, no stored token).
# Fires when a GitHub Release is published (tag a version, e.g. v0.3.0, and
# publish the release). Can also be run manually from the Actions tab.
#
# One-time PyPI setup (project owner): on pypi.org add a Trusted Publisher
# (a "pending publisher" before the first publish) with:
#   PyPI project name: taosmd
#   Owner:             jaylfc
#   Repository name:   taosmd
#   Workflow filename: publish.yml
#   Environment name:  pypi
# The first successful run creates the PyPI project.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
